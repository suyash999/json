<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | JSONCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #08080c; color: #f2ece0; font-family: 'DM Sans', sans-serif; text-align: center;
        }
        .wrap { padding: 40px; }
        .code { font-family: 'IBM Plex Mono', monospace; font-size: 5rem; font-weight: 800; color: #e8a838; }
        h1 { font-size: 1.4rem; margin: 12px 0 8px; }
        p { color: #8a8578; font-size: 0.95rem; margin-bottom: 24px; }
        a {
            display: inline-block; padding: 12px 28px; background: #e8a838; color: #0a0a0a;
            border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.9rem;
        }
        a:hover { background: #f0b848; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">{ 404 }</div>
        <h1>Page Not Found</h1>
        <p>The JSON you're looking for doesn't exist at this path.</p>
        <a href="/">Back to JSONCraft</a>
    </div>
</body>
</html>
